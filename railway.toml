[build]
builder = "NIXPACKS"

[deploy]
# Nixpacks will automatically determine the best start command (usually Nginx + PHP-FPM)
# Setting the root to backend ensures the server starts from the correct directory
root = "backend"

[nixpacks]
plan = { providers = ["php"] }

[nixpacks.phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.gd", "php82Extensions.mbstring"]

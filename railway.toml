[build]
builder = "NIXPACKS"

[deploy]
# Setting root to backend/public ensures that index.php is correctly detected
# and hides your config/controllers from public access.
root = "backend/public"

[nixpacks]
plan = { providers = ["php"] }

[nixpacks.phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.gd", "php82Extensions.mbstring"]

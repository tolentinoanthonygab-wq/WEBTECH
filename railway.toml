[build]
builder = "NIXPACKS"

[deploy]
# Using backend as root and relying on the gateway index.php
# This is the most compatible way for Nixpacks PHP.
root = "backend"

[nixpacks]
plan = { providers = ["php"] }

[nixpacks.phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.gd", "php82Extensions.mbstring"]
